# Scenario 19: Job Fails — BackoffLimitExceeded
# A batch Job is supposed to run a database migration.
# It keeps failing and eventually reaches backoffLimit.
# kubectl get jobs shows COMPLETIONS=0/1, STATUS=Failed.
# Diagnose why the Job failed and what you would fix.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: scenario-19-db-migrate
  namespace: practice
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrator
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Connecting to database..."
          # BUG is somewhere in this file
          /app/migrate --db-url=$DATABASE_URL --direction=up
          echo "Migration complete."
        env:
        - name: DATABASE_URL
          value: "postgres://admin:password@postgres:5432/appdb"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
