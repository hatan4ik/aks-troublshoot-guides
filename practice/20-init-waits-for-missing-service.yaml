# Scenario 20: Init Container Waits for Missing Service
# The pod is stuck in Init:0/1.
# The ConfigMap exists, but the init container waits forever for config-service.
# Diagnose the real blocker and fix it.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: scenario-20-nginx-config
  namespace: practice
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location / {
        return 200 "scenario-20 is healthy\n";
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-20
  namespace: practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-20
  template:
    metadata:
      labels:
        app: scenario-20
    spec:
      initContainers:
      - name: init-config
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for config-service..."
          until wget -q -O- http://config-service:8080/ready >/dev/null 2>&1; do
            echo "config-service not ready, retrying in 2s..."
            sleep 2
          done
          echo "config-service is ready."
      containers:
      - name: web
        image: nginx:1.25
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: nginx-config
        configMap:
          name: scenario-20-nginx-config
