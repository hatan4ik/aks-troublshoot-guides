# Scenario 17: Secret Does Not Exist (Wrong Secret Name)
# The pod fails immediately after scheduling with CreateContainerError.
# Unlike scenario 05 (wrong key inside a ConfigMap that exists),
# here the Secret object itself is missing entirely.
# Diagnose why and fix it.
#
# NOTE: No Secret is created by this manifest — that is intentional.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-17
  namespace: practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-17
  template:
    metadata:
      labels:
        app: scenario-17
    spec:
      containers:
      - name: web
        image: nginx:1.25
        ports:
        - containerPort: 80
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: scenario-17-api-credentials    # BUG is somewhere in this file — secret does not exist
              key: api-key
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
