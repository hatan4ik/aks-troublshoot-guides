# Scenario 2: Port Mismatch
# The pod is Running and healthy. The service exists.
# But curling the service returns "connection refused".
# Diagnose why and fix it.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-02
  namespace: practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-02
  template:
    metadata:
      labels:
        app: scenario-02
    spec:
      containers:
      - name: web
        image: nginx:1.25
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: scenario-02
  namespace: practice
spec:
  selector:
    app: scenario-02
  ports:
  - port: 80
    targetPort: 8080              # BUG is somewhere in this file
