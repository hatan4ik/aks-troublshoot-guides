# Scenario 12: Missing imagePullSecret for Private Registry
# The pod stays in ImagePullBackOff.
# The image tag is correct, but the registry requires authentication.
# No imagePullSecret is configured.
# Diagnose why and fix it.
#
# To simulate a fix (using a real public image as stand-in):
#   kubectl create secret docker-registry scenario-12-regcred \
#     --docker-server=registry.example.internal \
#     --docker-username=ci-robot \
#     --docker-password=fake-token \
#     -n practice
# (The secret creation works but the pull will still fail because the registry is fake.
#  The goal is to identify the missing imagePullSecrets field and add it.)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-12
  namespace: practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-12
  template:
    metadata:
      labels:
        app: scenario-12
    spec:
      # BUG is somewhere in this file
      # imagePullSecrets:
      # - name: scenario-12-regcred
      containers:
      - name: web
        image: registry.example.internal/myapp/api:v2.1.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
