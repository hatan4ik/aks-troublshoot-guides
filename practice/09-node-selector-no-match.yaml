# Scenario 9: Node Selector Does Not Match Any Node
# The pod stays Pending. Resources are available on nodes.
# No external setup required — the label simply does not exist on any node.
# Diagnose why and fix it.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-09
  namespace: practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scenario-09
  template:
    metadata:
      labels:
        app: scenario-09
    spec:
      nodeSelector:
        hardware: high-memory-optimized    # BUG is somewhere in this file
      containers:
      - name: web
        image: nginx:1.25
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
