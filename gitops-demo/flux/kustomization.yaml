apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-demo-app
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: aks-troublshoot-guides
  path: ./gitops-demo/apps/flux-app
  prune: true          # Delete resources removed from Git
  wait: true           # Wait for all resources to be Ready
  timeout: 2m
  targetNamespace: flux-demo
